<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Special Message</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    text-align:center;
    padding:30px;
}

.card{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

img{
    width:100%;
    border-radius:15px;
}

h1{
    margin-top:20px;
}

.message{
    font-size:18px;
    margin:20px 0;
    line-height:1.6;
}

button{
    padding:12px 24px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

.link-btn{
    display:inline-block;
    margin:10px;
    padding:12px 20px;
    text-decoration:none;
    background:#222;
    color:white;
    border-radius:10px;
}
</style>

</head>
<body>

<div class="card">

    <img src="xianrenzhang.jpg" alt="Photo">

    <h1>你好我是仙人掌</h1>

    <div class="message">
        我是一个仙人掌.<br>
        我是绿色的,<br>
        我可爱吗？
    </div>

    <audio controls style="width:100%;">
        <source src="xianrenzhang.mp3" type="audio/mpeg">
    </audio>

    <br><br>

    <a class="link-btn" href="https://www.instagram.com/cactus_kub?igsh=ZHhqNWNhNHZ1bzZ1">
        Instagram
    </a>

    <a class="link-btn" href="https://open.spotify.com/track/7MIKedmFXOF4al8tk7rHBR?si=fdjCrOyvSeaMPG1OphrfPA">
        Spotify
    </a>

</div>

</body>
</html>
